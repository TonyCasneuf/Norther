
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>First Aid Kit – Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #1e73be;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
    }

    .header h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
    }

    .container {
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f7f7f7;
      text-align: left;
    }

    .checkbox-cell {
      width: 40px;
      text-align: center;
      vertical-align: middle;
    }

    .checkbox-cell input[type="checkbox"] {
      transform: scale(1.4);
      cursor: pointer;
    }

    .location-cell {
      font-weight: bold;
      color: #333;
      width: 100px;
    }

    .name-cell {
      font-weight: 600;
    }

    .expiry-input {
      padding: 4px 8px;
      font-size: 14px;
      border: 1px solid #1e73be;
      border-radius: 4px;
      width: 120px;
    }

    @media (max-width: 480px) {
      th, td {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <!-- Header similar style to your main page -->
  <div class="header">
    <h1>NORTHER</h1>
    <h2>First Aid Kit – Inventory</h2>
  </div>

  <div class="container">
    <table id="inventoryTable">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Name</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody>
        <!-- Example item: Row 1 - Location & Name -->
        <tr>
          <td class="checkbox-cell" rowspan="3">
            <input type="checkbox" />
          </td>
          <td class="location-cell" rowspan="3">Pouch A</td>
          <td class="name-cell" rowspan="3">Sterile gauze pads</td>
          <td>Qty: 10</td>
        </tr>
        <!-- Row 2 - Empty -->
        <tr>
          <td></td>
        </tr>
        <!-- Row 3 - Expiry Date -->
        <tr>
          <td>Expiry: <input type="date" class="expiry-input" value="2028-05-31" /></td>
        </tr>

        <!-- Second item: Row 1 - Location & Name -->
        <tr>
          <td class="checkbox-cell" rowspan="3">
            <input type="checkbox" />
          </td>
          <td class="location-cell" rowspan="3">Pouch A</td>
          <td class="name-cell" rowspan="3">Adhesive bandages</td>
          <td>Qty: 25</td>
        </tr>
        <!-- Row 2 - Empty -->
        <tr>
          <td></td>
        </tr>
        <!-- Row 3 - Expiry Date -->
        <tr>
          <td>Expiry: <input type="date" class="expiry-input" value="2027-11-15" /></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
