
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>First Aid Kit – Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #1e73be;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
    }

    .header h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
    }

    .container {
      padding: 12px;
    }

    .search-box {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-box input {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      flex: 1;
      min-width: 150px;
    }

    .search-box button {
      padding: 8px 16px;
      font-size: 14px;
      background: #1e73be;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #155a99;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f7f7f7;
      text-align: left;
    }

    .checkbox-cell {
      width: 40px;
      text-align: center;
      vertical-align: middle;
    }

    .checkbox-cell input[type="checkbox"] {
      transform: scale(1.4);
      cursor: pointer;
    }

    .location-cell {
      font-weight: bold;
      color: #333;
      width: 40px;
    }

    .name-cell {
      font-weight: 600;
    }

    .item-details {
      font-size: 12px;
      color: #666;
    }

    tr.hidden {
      display: none;
    }

    @media (max-width: 480px) {
      th, td {
        font-size: 13px;
      }
      
      .search-box {
        flex-direction: column;
      }

      .search-box input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header similar style to your main page -->
  <div class="header">
    <h1>NORTHER</h1>
    <h2>First Aid Kit – Inventory</h2>
  </div>

  <div class="container">
    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search by Expiry (e.g., 2028-05-31)" 
      />
      <button onclick="searchTable()">Search</button>
      <button onclick="clearSearch()">Clear</button>
    </div>

    <table id="inventoryTable">
      <thead>
        <tr>
          <th></th>
          <th>Location</th>
          <th>Name</th>
          <th>Item No.</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody>
        <!-- Example item: Row 1 - Location & Name -->
        <tr class="data-row">
          <td class="checkbox-cell" rowspan="3">
            <input type="checkbox" />
          </td>
          <td class="location-cell" rowspan="3">A</td>
          <td class="name-cell" colspan="3">Sterile gauze pads</td>
        </tr>
        <!-- Row 2 - Item No & Qty -->
        <tr class="data-row">
          <td>123456789</td>
          <td>10</td>
          <td></td>
        </tr>
        <!-- Row 3 - Expiry Date -->
        <tr class="data-row">
          <td colspan="3" class="item-details">
            Expiry: <span class="expiry-cell">2028-05-31</span>
          </td>
        </tr>

        <!-- Second item: Row 1 - Location & Name -->
        <tr class="data-row">
          <td class="checkbox-cell" rowspan="3">
            <input type="checkbox" />
          </td>
          <td class="location-cell" rowspan="3">A</td>
          <td class="name-cell" colspan="3">Adhesive bandages</td>
        </tr>
        <!-- Row 2 - Item No & Qty -->
        <tr class="data-row">
          <td>987654321</td>
          <td>25</td>
          <td></td>
        </tr>
        <!-- Row 3 - Expiry Date -->
        <tr class="data-row">
          <td colspan="3" class="item-details">
            Expiry: <span class="expiry-cell">2027-11-15</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function searchTable() {
      const searchInput = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll('#inventoryTable tbody tr.data-row');

      rows.forEach((row) => {
        const expiryCell = row.querySelector('.expiry-cell');
        const nameCell = row.querySelector('.name-cell');
        
        let matches = false;
        
        if (expiryCell) {
          const expiry = expiryCell.textContent.toLowerCase();
          matches = expiry.includes(searchInput);
        }
        
        if (!matches && nameCell) {
          const name = nameCell.textContent.toLowerCase();
          matches = name.includes(searchInput);
        }
        
        row.classList.toggle('hidden', searchInput && !matches);
      });
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('#inventoryTable tbody tr.data-row').forEach(row => {
        row.classList.remove('hidden');
      });
    }

    // Allow Enter key to search
    document.getElementById('searchInput').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        searchTable();
      }
    });
  </script>
</body>
</html>
