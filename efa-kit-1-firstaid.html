
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>First Aid Kit – Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #1e73be;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
    }

    .header h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
    }

    .container {
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #f7f7f7;
      text-align: left;
    }

    .checkbox-cell {
      width: 40px;
      text-align: center;
      vertical-align: middle;
    }

    .checkbox-cell input[type="checkbox"] {
      transform: scale(1.4);
      cursor: pointer;
    }

    .location {
      font-weight: bold;
      color: #333;
    }

    .item-details {
      font-size: 12px;
      color: #666;
    }

    @media (max-width: 480px) {
      th, td {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <!-- Header similar style to your main page -->
  <div class="header">
    <h1>NORTHER</h1>
    <h2>First Aid Kit – Inventory</h2>
  </div>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Location</th>
          <th>Name</th>
          <th>Item No.</th>
          <th>Qty</th>
          <th>Expiry</th>
        </tr>
      </thead>
      <tbody>
        <!-- Example item -->
        <tr>
          <td class="checkbox-cell" rowspan="2">
            <input type="checkbox" />
          </td>
          <td class="location" rowspan="2">Pouch A</td>
          <td rowspan="2">Sterile gauze pads</td>
          <td>123456789</td>
          <td>10</td>
          <td>2028-05-31</td>
        </tr>
        <tr>
          <td colspan="3" class="item-details"></td>
        </tr>

        <!-- Second item -->
        <tr>
          <td class="checkbox-cell" rowspan="2">
            <input type="checkbox" />
          </td>
          <td class="location" rowspan="2">Pouch A</td>
          <td rowspan="2">Adhesive bandages</td>
          <td>987654321</td>
          <td>25</td>
          <td>2027-11-15</td>
        </tr>
        <tr>
          <td colspan="3" class="item-details"></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
